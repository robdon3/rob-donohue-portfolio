# Payments testground scenarios (try before you apply)
payments_testground:
  - name: avalanche_1k
    strategy: avalanche
    budget: 1000
    description: "Throw $1k at highest APR first"
  - name: snowball_1k
    strategy: snowball
    budget: 1000
    description: "Throw $1k at smallest balance first"
  - name: directed_split
    strategy: directed
    budget: 1000
    description: "Fixed split — loan + alpha card"
    directed:
      personal_loan: 600
      card_alpha: 400

market:
