# =============================================================================
# SYNTHETIC ONLY — fictional numbers for a public demo.
# Structure mirrors a purpose-built personal workbook: control surface, journal,
# holdings, debt, payments testground, paycheck. Not a product pitch.
# =============================================================================

persona:
  name: "Demo workbook (synthetic)"
  as_of: "2026-07-18"
  disclaimer: "Synthetic numbers only. Shows structure and method — not real finances."

# What each area is for (this is the design — surfaces with jobs)
areas:
  - id: control
    name: Financial Sheet
    purpose: "Today's totals, limits, debt clocks, directives. What I need to see."
  - id: journal
    name: Journal
    purpose: "Daily snapshot log. Upsert by date — re-run safe. History I can trust."
  - id: holdings
    name: Holdings
    purpose: "Line-level truth: account × asset × qty × mark."
  - id: debt
    name: Debt stack
    purpose: "Facilities, utilization, payoff clocks. Order and pressure, not vibes."
  - id: payments
    name: Payments testground
    purpose: "Sandbox payment strategies before they hit the live ledger."
  - id: paycheck
    name: Paycheck
    purpose: "Waterfall of net income into buckets. Scenario toggles."
  - id: phone
    name: Phone view
    purpose: "Same model, compressed for glance / mobile."

