runway:
  monthly_expenses: 4200.0
  months_target: 6
  # optional: cash accounts counted toward expense fund
  fund_account_ids:
    - cash_reserve
    - cash_primary

cashflow:
  net_income_annual: 96000.0
  cadence: biweekly
  # waterfall allocation fractions of each paycheck (must sum ~1.0)
  waterfall:
    - name: Housing
      fraction: 0.28
    - name: Essentials
      fraction: 0.18
    - name: Debt payments
      fraction: 0.22
    - name: Investing
      fraction: 0.15
    - name: Buffer / fun
      fraction: 0.10
    - name: Emergency fund top-up
      fraction: 0.07
  scenarios:
    - name: baseline
      income_multiplier: 1.0
      debt_extra: 0.0
    - name: aggressive_debt
      income_multiplier: 1.0
      debt_extra: 400.0
    - name: reduced_income
      income_multiplier: 0.85
      debt_extra: 0.0

ops_policy:
  notes: "Methodical check-in. Synthetic directive for demo only."
  market_directive: "Rebalance on schedule; no chase. Not advice."
  card_of_day:
    Monday: card_gamma
    Tuesday: card_alpha
    Wednesday: card_beta
    Thursday: card_alpha
    Friday: card_beta
    Saturday: card_gamma
    Sunday: card_gamma

